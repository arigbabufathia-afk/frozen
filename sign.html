<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frozen Foods - Sign Up</title>

  <!-- Bootstrap -->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <style>
    body {
      background-color: #fff4a4 ;
      font-family: "DM Sans", sans-serif;
    }

    .signup-wrapper {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .signup-card {
      background: #fff4a4;
      padding: 40px 35px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
      animation: fadeIn 0.7s ease-in-out;
    }

    .signup-card h2 {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .signup-card p {
      color: #6c757d;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .btn-primary {
      background: #28a745;
      border: none;
    }

    .btn-primary:hover {
      background: #218838;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="signup-wrapper">
  <div class="signup-card">

    <h2 class="text-center">Create an Account</h2>
    <p class="text-center">Join us today and shop the best frozen foods.</p>

    <form>
      <!-- Full Name -->
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your full name" required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" placeholder="Enter email address" required>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Create a password" required>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" placeholder="Re-enter password" required>
      </div>

      <!-- Terms -->
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="termsCheck" required>
        <label class="form-check-label" for="termsCheck">
          I agree to the <a href="#" class="text-success">Terms & Conditions</a>
        </label>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>

      <!-- Login Redirect -->
      <div class="text-center mt-3">
        <small>Already have an account? <a href="login.html" class="text-success">Login</a></small>
      </div>
    </form>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
